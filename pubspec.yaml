name: seniornest
description: A new Flutter project.
publish_to: none
version: 1.0.0+5

environment:
  sdk: ^3.9.0

dependencies:
  flutter:       # CRITICAL: Required for every Flutter project - DO NOT REMOVE
    sdk: flutter # CRITICAL: Required for every Flutter project - DO NOT REMOVE
  
  # CRITICAL: Core UI and responsive design - DO NOT REMOVE OR MODIFY
  supabase_flutter: ^2.9.1
  sizer: ^2.0.15              # Required for responsive design system
  flutter_svg: ^2.0.9        # Required for SVG icon support
  google_fonts: ^6.1.0       # Required for typography (replaces local fonts)
  shared_preferences: ^2.2.2 # Required for local data storage
  web: ^1.1.1
  
  # Feature dependencies - safe to modify
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.4
  dio: ^5.4.0
  fluttertoast: ^8.2.4
  fl_chart: ^0.65.0
  share_plus: ^12.0.1         # Native device share sheet for social media sharing
  video_player: ^2.9.5        # Full-screen video playback in Family Feed and Legacy Stories
  image_picker: ^1.0.4        # Pick photos from device photo library for profile photo selection
  intl: ^0.20.2               # Date formatting for birthday/anniversary display in Celebrations card
  file_picker: ^8.1.7
  photo_manager: ^3.9.0       # Flutter-rendered photo grid picker that bypasses iOS native action sheet
  google_sign_in: ^7.2.0      # Google Sign-In for native OAuth flow (Android/iOS)

  universal_html: ^2.2.4
  in_app_purchase: ^3.2.3
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  sign_in_with_apple: ^8.0.0
  crypto: ^3.0.7
  record: ^6.2.1
  camera: ^0.12.0+1
  path_provider: ^2.1.5
  just_audio: ^0.10.5

dependency_overrides:
  path_provider_foundation: 2.5.1 # Fix App Store validation error: pins to plugin-based implementation that does not include objective_c.framework (>=2.6.0 pulls in objective_c native assets/FFI causing arm64e-only bundle rejection)

dev_dependencies:
  flutter_test:    # CRITICAL: Required for Flutter project testing - DO NOT REMOVE
    sdk: flutter   # CRITICAL: Required for Flutter project testing - DO NOT REMOVE
  flutter_lints: ^5.0.0 # CRITICAL: Required for code quality - DO NOT REMOVE

flutter:
  uses-material-design: true # CRITICAL: Required for Material icon font - DO NOT REMOVE
  assets:
    - assets/
    - assets/images/
  # CRITICAL ASSET MANAGEMENT RULES:
  # - DO NOT ADD NEW ASSET DIRECTORIES (assets/svg/, assets/icons/, etc.)
  # - ONLY USE EXISTING AND ITEMS AVAILABLE IN THE DIRECTORIES LISTED ABOVE (assets/, assets/images/)
  
  # CRITICAL FONTS RULE: 
  # - THIS PROJECT USES GOOGLE FONTS INSTEAD OF LOCAL FONTS
  # - DO NOT ADD ANY LOCAL FONTS SECTION OR FONT FILES
